<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal Bread Menu Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #c5c0bd;
    --paper-light: #d0ccc7;
    --ink: #1a1a1a;
    --ink-soft: #4a4a48;
    --line: #a8a39d;
    --warm: #b8b3ad;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 20px 100px;
    line-height: 1.6;
    font-weight: 400;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header {
    text-align: center;
    padding: 24px 0 32px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
  }
  header h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }
  header p {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }

  .footer-message {
    background: var(--paper-light);
    padding: 16px;
    margin-bottom: 24px;
    border: 1px solid var(--line);
  }
  .footer-message label {
    font-size: 13px;
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
  }
  .footer-message small {
    font-size: 11px;
    color: var(--ink-soft);
    display: block;
    margin-bottom: 10px;
  }
  .footer-message textarea {
    width: 100%;
    min-height: 70px;
    font-family: inherit;
    font-size: 13px;
    border: 1px solid var(--line);
    background: white;
    padding: 8px 10px;
    resize: vertical;
    line-height: 1.6;
  }
  .footer-message textarea:focus { outline: 1px solid var(--ink); }

  .category {
    background: var(--paper-light);
    border: 1px solid var(--line);
    margin-bottom: 24px;
    padding: 20px;
    overflow: hidden;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .category-header input {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 17px;
    font-weight: 500;
    border: none;
    background: transparent;
    padding: 4px 0;
    color: var(--ink);
    border-bottom: 1px dashed var(--line);
  }
  .category-header input:focus { outline: none; border-bottom-color: var(--ink); }

  .items { display: flex; flex-direction: column; gap: 8px; }

  .item {
    display: grid;
    grid-template-columns: auto 60px minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    padding: 10px;
    background: var(--warm);
    transition: opacity 0.2s, transform 0.2s;
    min-width: 0;
  }
  .item.dragging { opacity: 0.4; }
  .item.drag-over-top { box-shadow: 0 -3px 0 var(--ink); }
  .item.drag-over-bottom { box-shadow: 0 3px 0 var(--ink); }

  .item-grip {
    cursor: grab;
    color: var(--ink-soft);
    padding: 8px 6px;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    font-size: 16px;
    line-height: 1;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .item-grip:active { cursor: grabbing; }

  /* When an item is being dragged via touch */
  .item.touch-dragging {
    opacity: 0.6;
    transform: scale(0.98);
    z-index: 100;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .item.touch-target-top { box-shadow: inset 0 4px 0 var(--ink); }
  .item.touch-target-bottom { box-shadow: inset 0 -4px 0 var(--ink); }

  .item-photo {
    width: 60px; height: 60px;
    border: 1px dashed var(--line);
    background: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
  }
  .item-photo img { width: 100%; height: 100%; object-fit: cover; }
  .item-photo span { font-size: 10px; color: var(--ink-soft); text-align: center; padding: 2px; }
  .item-photo input[type=file] { display: none; }

  .item-fields { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .item-fields input {
    font-family: inherit;
    border: none;
    background: white;
    padding: 5px 7px;
    font-size: 13px;
    width: 100%;
    min-width: 0;
  }
  .item-fields input:focus { outline: 1px solid var(--ink); }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--ink-soft);
    font-size: 14px;
    transition: color 0.2s;
  }
  .icon-btn:hover { color: var(--ink); }
  .icon-btn.danger:hover { color: #c44; }

  /* Add row: stack into a 2-column grid (responsive) */
  .add-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .add-row .add-btn { margin-top: 0; }

  .add-btn {
    background: white;
    border: 1px solid var(--line);
    padding: 10px;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
    width: 100%;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .add-btn:hover { border-color: var(--ink); color: var(--ink); }

  .add-category {
    background: transparent;
    border: 1px dashed var(--line);
    padding: 16px;
    width: 100%;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 32px;
    transition: all 0.2s;
  }
  .add-category:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

  .actions {
    position: sticky;
    bottom: 16px;
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 32px;
    z-index: 10;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 32px;
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .btn-primary:hover { background: #000; }
  .btn-secondary {
    background: var(--paper-light);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 14px 24px;
    font-family: 'Archivo', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .modal {
    position: fixed; inset: 0;
    background: rgba(20,18,15,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    overflow-y: auto;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: var(--paper);
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none;
    font-size: 24px; cursor: pointer;
    color: var(--ink-soft);
  }
  .modal h2 {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .preview-pages { display: flex; flex-direction: column; gap: 16px; align-items: center; }
  .preview-page {
    width: 100%;
    max-width: 320px;
    aspect-ratio: 4 / 5;
    overflow: hidden;
  }
  .preview-page img { width: 100%; height: 100%; display: block; object-fit: contain; }
  .download-all { margin-top: 16px; width: 100%; }

  #render-canvas { display: none; }

  .info {
    background: var(--paper-light);
    padding: 12px 16px;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 24px;
    border-left: 3px solid var(--ink);
  }
  .info b { color: var(--ink); }

  .progress {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 20px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>MENU BUILDER</h1>
    <p>カテゴリーと商品を入力 → メニュー画像を生成</p>
  </header>

  <div class="info">
    入力内容はこのブラウザに自動保存されます。次回開いたときも残っています。<br>
    出力サイズ：<b>インスタ縦長 1080×1350</b>／1ページ最大12点／写真は<b>「+ 写真をまとめて追加」</b>で複数選択できます。
  </div>

  <!-- Footer message -->
  <div class="footer-message">
    <label>最終メッセージ（任意）</label>
    <small>最後のページの商品一覧の下に表示されます</small>
    <textarea id="footer-message-input" placeholder="例：その時々で限定メニューもございますので&#10;詳しくはインスタグラムをチェックしてください。" oninput="updateFooterMessage(this.value)"></textarea>
  </div>

  <div id="categories"></div>

  <button class="add-category" onclick="addCategory()">＋ カテゴリーを追加</button>

  <div class="actions">
    <button class="btn-secondary" onclick="clearAll()">CLEAR</button>
    <button class="btn-primary" onclick="generatePreview()">GENERATE</button>
  </div>
</div>

<input type="file" id="bulk-photo-input" accept="image/*" multiple style="display:none">

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>PREVIEW</h2>
    <div class="preview-pages" id="preview-pages"></div>
    <button class="btn-primary download-all" onclick="downloadAll()">すべての画像をダウンロード（ZIP）</button>
  </div>
</div>

<canvas id="render-canvas" width="1080" height="1350"></canvas>

  let state = {
    footerMessage: '',

  const STORAGE_KEY = 'canal-bread-menu-state-v6';

  let saveErrorShown = false;
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      saveErrorShown = false;
    } catch (e) {
      console.warn('保存できませんでした', e);
      if (!saveErrorShown) {
        saveErrorShown = true;
        alert('ブラウザの保存容量が一杯になりました。\n\n商品が多すぎる可能性があります。生成した画像を保存した後、CLEARで一度クリアするか、不要な商品を削除してください。\n\n※ 入力したデータは画面内では保持されますが、ブラウザを閉じると消える可能性があります。早めに画像を生成してください。');

  function load() {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) state = JSON.parse(s);
    } catch (e) {}
    if (!state.categories || state.categories.length === 0) {
      state.categories = [
        { name: '食パン', items: [{ name: '', price: '', photo: null }] }
      ];
    }
  }

    }

    root.innerHTML = '';
    state.categories.forEach((cat, ci) => {
      const div = document.createElement('div');
      div.className = 'category';
      div.dataset.ci = ci;
      div.innerHTML = `
        <div class="category-header">
          <input type="text" value="${escapeHtml(cat.name)}" placeholder="カテゴリー名（例：食パン）" oninput="updateCategoryName(${ci}, this.value)">
          <button class="icon-btn danger" onclick="removeCategory(${ci})" title="このカテゴリーを削除">✕</button>
        </div>
        <div class="items" data-ci="${ci}">
          ${cat.items.map((it, ii) => itemHtml(ci, ii, it)).join('')}
        </div>
        <div class="add-row">
          <button class="add-btn" onclick="addItem(${ci})">＋ 商品を追加</button>
          <button class="add-btn" onclick="bulkAddPhotos(${ci})">＋ 写真をまとめて追加</button>
        </div>
      `;
      root.appendChild(div);
    });

    setupDragHandlers();
  }

  function itemHtml(ci, ii, it) {
    const photoContent = it.photo
      ? `<img src="${it.photo}" alt="">`
      : `<span>写真</span>`;
    return `
      <div class="item" draggable="true" data-ci="${ci}" data-ii="${ii}">
        <span class="item-grip" title="ドラッグで並び替え">⋮⋮</span>
        <label class="item-photo">
          ${photoContent}
          <input type="file" accept="image/*" onchange="uploadPhoto(${ci}, ${ii}, this)">
        </label>
        <div class="item-fields">
          <input type="text" placeholder="商品名" value="${escapeHtml(it.name)}" oninput="updateItem(${ci}, ${ii}, 'name', this.value)">
          <input type="text" placeholder="価格(数字を入力)" value="${escapeHtml(formatPrice(it.price))}" onfocus="onPriceFocus(this, ${ci}, ${ii})" onblur="onPriceBlur(this, ${ci}, ${ii})" oninput="updateItem(${ci}, ${ii}, 'price', this.value)" inputmode="numeric">
        </div>
        <button class="icon-btn danger" onclick="removeItem(${ci}, ${ii})" title="削除">✕</button>
      </div>
    `;
  }

  // Show raw input on focus, formatted on blur
  function onPriceFocus(input, ci, ii) {
    input.value = state.categories[ci].items[ii].price || '';
  }
  function onPriceBlur(input, ci, ii) {
    const raw = input.value;
    state.categories[ci].items[ii].price = raw;
    input.value = formatPrice(raw);
    save();
  }

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // === Drag & Drop ===
  let dragSource = null;

  function setupDragHandlers() {
    document.querySelectorAll('.item').forEach(el => {
      // Desktop drag & drop
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragend', onDragEnd);
      el.addEventListener('dragover', onDragOver);
      el.addEventListener('dragleave', onDragLeave);
      el.addEventListener('drop', onDrop);
    });
    // Touch drag (mobile) — bind on grip handle
    document.querySelectorAll('.item-grip').forEach(grip => {
      grip.addEventListener('touchstart', onTouchStart, { passive: false });
    });
  }

  function onDragStart(e) {
    dragSource = { ci: +this.dataset.ci, ii: +this.dataset.ii };
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.item').forEach(el => {
      el.classList.remove('drag-over-top', 'drag-over-bottom');
    });
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = this.getBoundingClientRect();
    const isTop = (e.clientY - rect.top) < rect.height / 2;
    this.classList.toggle('drag-over-top', isTop);
    this.classList.toggle('drag-over-bottom', !isTop);
    return false;
  }
  function onDragLeave(e) {
    this.classList.remove('drag-over-top', 'drag-over-bottom');
  }
  function onDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!dragSource) return;
    const target = { ci: +this.dataset.ci, ii: +this.dataset.ii };
    const rect = this.getBoundingClientRect();
    const isTop = (e.clientY - rect.top) < rect.height / 2;
    moveItem(dragSource, target, isTop);
    dragSource = null;
    return false;
  }

  // === Touch drag for mobile ===
  let touchDrag = null;

  function onTouchStart(e) {
    e.preventDefault();
    e.stopPropagation();
    const itemEl = this.closest('.item');
    if (!itemEl) return;

    const touch = e.touches[0];
    touchDrag = {
      itemEl,
      ci: +itemEl.dataset.ci,
      ii: +itemEl.dataset.ii,
      startY: touch.clientY,
      startX: touch.clientX,
      currentTarget: null,
      currentInsertBefore: true
    };
    itemEl.classList.add('touch-dragging');

    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd, { passive: false });
    document.addEventListener('touchcancel', onTouchEnd, { passive: false });
  }

  function onTouchMove(e) {
    if (!touchDrag) return;
    e.preventDefault();
    const touch = e.touches[0];

    // Visual: shift the dragged item with the finger
    const dy = touch.clientY - touchDrag.startY;
    touchDrag.itemEl.style.transform = `translateY(${dy}px) scale(0.98)`;

    // Find item under finger (excluding the dragged one)
    touchDrag.itemEl.style.pointerEvents = 'none';
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    touchDrag.itemEl.style.pointerEvents = '';

    const target = elBelow ? elBelow.closest('.item') : null;

    // Clear previous highlight
    document.querySelectorAll('.item.touch-target-top, .item.touch-target-bottom')
      .forEach(el => el.classList.remove('touch-target-top', 'touch-target-bottom'));

    if (target && target !== touchDrag.itemEl) {
      const rect = target.getBoundingClientRect();
      const isTop = (touch.clientY - rect.top) < rect.height / 2;
      target.classList.add(isTop ? 'touch-target-top' : 'touch-target-bottom');
      touchDrag.currentTarget = target;
      touchDrag.currentInsertBefore = isTop;
    } else {
      touchDrag.currentTarget = null;
    }
  }

  function onTouchEnd(e) {
    if (!touchDrag) return;
    e.preventDefault();

    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    document.removeEventListener('touchcancel', onTouchEnd);

    // Clear visual state
    touchDrag.itemEl.style.transform = '';
    touchDrag.itemEl.classList.remove('touch-dragging');
    document.querySelectorAll('.item.touch-target-top, .item.touch-target-bottom')
      .forEach(el => el.classList.remove('touch-target-top', 'touch-target-bottom'));

    if (touchDrag.currentTarget) {
      const src = { ci: touchDrag.ci, ii: touchDrag.ii };
      const tgt = {
        ci: +touchDrag.currentTarget.dataset.ci,
        ii: +touchDrag.currentTarget.dataset.ii
      };
      moveItem(src, tgt, touchDrag.currentInsertBefore);
    }
    touchDrag = null;
  }

  function moveItem(src, tgt, insertBefore) {
    const item = state.categories[src.ci].items.splice(src.ii, 1)[0];
    let targetIndex = tgt.ii;
    if (src.ci === tgt.ci && src.ii < tgt.ii) targetIndex--;
    if (!insertBefore) targetIndex++;
    if (targetIndex < 0) targetIndex = 0;
    state.categories[tgt.ci].items.splice(targetIndex, 0, item);
    save(); render();
  }

  // === Actions ===
  function addCategory() {
    state.categories.push({ name: '', items: [{ name: '', price: '', photo: null }] });
    save(); render();
  }
  function removeCategory(ci) {
    if (!confirm('このカテゴリーを削除しますか？')) return;
    state.categories.splice(ci, 1);
    save(); render();
  }
  function updateCategoryName(ci, v) {
    state.categories[ci].name = v;
    save();
  }
  function addItem(ci) {
    state.categories[ci].items.push({ name: '', price: '', photo: null });
    save(); render();
  }
  function removeItem(ci, ii) {
    state.categories[ci].items.splice(ii, 1);
    save(); render();
  }
  function updateItem(ci, ii, field, v) {
    state.categories[ci].items[ii][field] = v;
    save();
  }
  function updateFooterMessage(v) {
    state.footerMessage = v;
    save();
  }

  function resizeAndStore(file, max, callback) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > h && w > max) { h = h * max / w; w = max; }
        else if (h > max) { w = w * max / h; h = max; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function uploadPhoto(ci, ii, input) {
    const file = input.files[0];
    if (!file) return;
    resizeAndStore(file, 400, dataUrl => {
      state.categories[ci].items[ii].photo = dataUrl;
      save(); render();
    });
  }

  let bulkAddTarget = null;
  document.getElementById('bulk-photo-input').addEventListener('change', async function() {
    if (!this.files || !this.files.length || bulkAddTarget === null) return;
    const ci = bulkAddTarget;
    bulkAddTarget = null;
    const files = Array.from(this.files);
    this.value = '';

    const results = await Promise.all(files.map(file => new Promise(resolve => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          const max = 400;
          let w = img.width, h = img.height;
          if (w > h && w > max) { h = h * max / w; w = max; }
          else if (h > max) { w = w * max / h; h = max; }
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', 0.75));
        };
        img.onerror = () => resolve(null);
        img.src = e.target.result;
      };
      r.onerror = () => resolve(null);
      r.readAsDataURL(file);
    })));

    const items = state.categories[ci].items;
    let resultIndex = 0;
    for (let i = 0; i < items.length && resultIndex < results.length; i++) {
      if (!items[i].photo && !items[i].name && !items[i].price) {
        items[i].photo = results[resultIndex++];
      }
    }
    while (resultIndex < results.length) {
      items.push({ name: '', price: '', photo: results[resultIndex++] });
    }

    save(); render();
  });

  function bulkAddPhotos(ci) {
    bulkAddTarget = ci;
    document.getElementById('bulk-photo-input').click();
  }

  function clearAll() {
    if (!confirm('すべてのデータを消去します。よろしいですか？')) return;
    state = { footerMessage: '', categories: [] };
    localStorage.removeItem(STORAGE_KEY);
    load(); render();
  }

  // === Image Generation ===
  // Tighter layout to fit 12 items (2 cols x 6 rows) per page
  const CANVAS_W = 1080;
  const CANVAS_H = 1350;
  const PADDING_X = 55;
  const PADDING_TOP = 36;
  const PADDING_BOTTOM = 24;
  const HEADER_H = 42;          // tighter header
  const FOOTER_H = 36;          // much tighter footer
  const CATEGORY_HEADER_H = 42;
  const ITEM_H = 168;           // a bit taller for bigger photo
  const COL_GAP = 22;
  const ITEM_GAP = 4;
  const MESSAGE_LINE_H = 30;

  function buildPages() {
    // Build a flat list of blocks, each tagged with its parent category name.
    const blocks = [];
    state.categories.forEach(cat => {
      if (!cat.items.length) return;
      const catName = cat.name || '';
      blocks.push({ type: 'category', name: catName, parent: catName });
      for (let i = 0; i < cat.items.length; i += 2) {
        blocks.push({
          type: 'row',
          parent: catName,
          items: cat.items.slice(i, i + 2)
        });
      }
    });

    const hasMessage = !!(state.footerMessage && state.footerMessage.trim());
    const messageLines = hasMessage
      ? state.footerMessage.split(/\r?\n/).length
      : 0;
    const messageBlockH = hasMessage ? (messageLines * MESSAGE_LINE_H + 24) : 0;

    const pages = [];
    const availHeight = CANVAS_H - PADDING_TOP - HEADER_H - PADDING_BOTTOM - FOOTER_H;

    let current = [];
    let usedHeight = 0;
    let currentCategoryName = null; // tracks last category emitted on this page

    function startNewPage() {
      pages.push({ type: 'content', blocks: current, hasMessage: false });
      current = [];
      usedHeight = 0;
      currentCategoryName = null;
    }

    for (let idx = 0; idx < blocks.length; idx++) {
      const block = blocks[idx];
      const isLastBlock = idx === blocks.length - 1;
      const reserveMessage = isLastBlock && hasMessage ? messageBlockH : 0;

      // For category headers: ensure header + at least one row fits
      if (block.type === 'category') {
        const nextRowH = ITEM_H + ITEM_GAP;
        if (usedHeight + CATEGORY_HEADER_H + nextRowH > availHeight && current.length > 0) {
          startNewPage();
        }
        current.push(block);
        usedHeight += CATEGORY_HEADER_H;
        currentCategoryName = block.parent;
        continue;
      }

      // For rows: check if it fits
      const rowH = ITEM_H + ITEM_GAP;
      if (usedHeight + rowH + reserveMessage > availHeight && current.length > 0) {
        startNewPage();
      }

      // If we're starting a new page (or the page never had this category's header),
      // emit a continuation category header automatically.
      if (currentCategoryName !== block.parent) {
        // We landed on a new page mid-category — re-emit the header
        if (usedHeight + CATEGORY_HEADER_H + rowH + reserveMessage > availHeight && current.length > 0) {
          startNewPage();
        }
        current.push({ type: 'category', name: block.parent, parent: block.parent });
        usedHeight += CATEGORY_HEADER_H;
        currentCategoryName = block.parent;
      }

      current.push(block);
      usedHeight += rowH;
    }

    if (current.length > 0) {
      pages.push({ type: 'content', blocks: current, hasMessage: hasMessage });
    } else if (hasMessage && pages.length > 0) {
      pages[pages.length - 1].hasMessage = true;
    }

    return pages;
  }

  function loadImage(src) {
    return new Promise((resolve) => {
      if (!src) return resolve(null);
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  async function getPaperImage() {
    if (paperImageCache) return paperImageCache;
    paperImageCache = await loadImage(PAPER_TEXTURE);
    return paperImageCache;
  }

  async function getLogoImage() {
    if (logoImageCache) return logoImageCache;
    logoImageCache = await loadImage(LOGO_PNG);
    return logoImageCache;
  }

  async function drawPaperBackground(ctx) {
    const paper = await getPaperImage();
    if (paper) {
      const aspect = paper.width / paper.height;
      const canvasAspect = CANVAS_W / CANVAS_H;
      let sx = 0, sy = 0, sw = paper.width, sh = paper.height;
      if (aspect > canvasAspect) {
        sw = paper.height * canvasAspect;
        sx = (paper.width - sw) / 2;
      } else {
        sh = paper.width / canvasAspect;
        sy = (paper.height - sh) / 2;
      }
      ctx.drawImage(paper, sx, sy, sw, sh, 0, 0, CANVAS_W, CANVAS_H);
    } else {
      ctx.fillStyle = '#e8e6e0';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
  }

  async function renderPage(page, pageNum, totalPages) {
    const canvas = document.getElementById('render-canvas');
    const ctx = canvas.getContext('2d');

    await drawPaperBackground(ctx);

    // === Top header: MENU ===
    ctx.fillStyle = '#1a1a1a';
    ctx.font = '700 22px "Archivo", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('MENU', PADDING_X, PADDING_TOP + 20);

    // Page indicator
    ctx.font = '500 14px "Archivo", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`${String(pageNum).padStart(2, '0')} / ${String(totalPages).padStart(2, '0')}`, CANVAS_W - PADDING_X, PADDING_TOP + 20);

    // Top horizontal line
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PADDING_X, PADDING_TOP + HEADER_H - 8);
    ctx.lineTo(CANVAS_W - PADDING_X, PADDING_TOP + HEADER_H - 8);
    ctx.stroke();

    // === Content with even distribution of vertical space ===
    const blocks = page.blocks || [];

    // Compute minimum content height
    const numCategories = blocks.filter(b => b.type === 'category').length;
    const numRows = blocks.filter(b => b.type === 'row').length;
    const minContentH =
      numCategories * CATEGORY_HEADER_H +
      numRows * ITEM_H +
      Math.max(0, numRows - 1) * ITEM_GAP;

    // Reserve message space if present
    let messageReserveH = 0;
    if (page.hasMessage && state.footerMessage) {
      const tmpFont = '400 17px "Noto Sans JP", sans-serif';
      ctx.font = tmpFont;
      const maxWidth = CANVAS_W - PADDING_X * 2 - 60;
      const userLines = state.footerMessage.split(/\r?\n/);
      let lineCount = 0;
      userLines.forEach(line => {
        lineCount += wrapText(ctx, line, maxWidth).length;
      });
      messageReserveH = lineCount * MESSAGE_LINE_H + 24;
    }

    const contentTop = PADDING_TOP + HEADER_H + 6;
    const contentBottom = CANVAS_H - PADDING_BOTTOM - FOOTER_H - 6;
    const availableContentH = contentBottom - contentTop - messageReserveH;
    const extraSpace = Math.max(0, availableContentH - minContentH);

    // Distribute extra space:
    //   - Each row gap gets a share (numRows - 1 gaps)
    //   - Each category header gets a small share of "breathing space" above it
    //     except the very first one (which sits flush to the top)
    const numRowGaps = Math.max(0, numRows - 1);
    const numCatBreaks = Math.max(0, numCategories - 1);
    // Weight: row gaps get larger share than category breaks
    // Total weighted slots: rowGaps*1 + catBreaks*1.5
    const totalWeight = numRowGaps * 1 + numCatBreaks * 1.5;
    let perRowGap = ITEM_GAP;
    let perCatBreak = 0;
    if (totalWeight > 0) {
      const unit = extraSpace / totalWeight;
      perRowGap = ITEM_GAP + unit;
      perCatBreak = unit * 1.5;
      // Cap to avoid weird-looking giant gaps
      perRowGap = Math.min(perRowGap, ITEM_GAP + 90);
      perCatBreak = Math.min(perCatBreak, 60);
    }

    let y = contentTop;
    let isFirstBlock = true;
    let prevWasRow = false;

    for (const block of blocks) {
      if (block.type === 'category') {
        // Add breathing space before non-first category
        if (!isFirstBlock) {
          y += perCatBreak;
        }
        ctx.fillStyle = '#1a1a1a';
        ctx.font = '700 19px "Noto Sans JP", sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(block.name, PADDING_X, y + 22);

        const textWidth = ctx.measureText(block.name).width;
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(PADDING_X + textWidth + 14, y + 20);
        ctx.lineTo(CANVAS_W - PADDING_X, y + 20);
        ctx.stroke();

        y += CATEGORY_HEADER_H;
        prevWasRow = false;
      } else if (block.type === 'row') {
        // Add row gap before non-first row
        if (prevWasRow) {
          y += perRowGap;
        }
        const colWidth = (CANVAS_W - PADDING_X * 2 - COL_GAP) / 2;
        for (let i = 0; i < block.items.length; i++) {
          const item = block.items[i];
          const x = PADDING_X + i * (colWidth + COL_GAP);
          await renderItem(ctx, item, x, y, colWidth);
        }
        y += ITEM_H;
        prevWasRow = true;
      }
      isFirstBlock = false;
    }

    // === Footer message ===
    if (page.hasMessage && state.footerMessage) {
      ctx.fillStyle = '#1a1a1a';
      ctx.font = '400 17px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'left';

      const maxWidth = CANVAS_W - PADDING_X * 2;
      const userLines = state.footerMessage.split(/\r?\n/);
      const allLines = [];
      userLines.forEach(line => {
        const wrapped = wrapText(ctx, line, maxWidth);
        wrapped.forEach(l => allLines.push(l));
      });

      // Place message near the bottom of content area, with some gap from last item
      let ty = y + 28;
      allLines.forEach(line => {
        ctx.fillText(line, PADDING_X, ty);
        ty += MESSAGE_LINE_H;
      });
    }

    // === Footer: line + logo (right) ===
    const footerY = CANVAS_H - PADDING_BOTTOM - FOOTER_H + 4;
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(PADDING_X, footerY);
    ctx.lineTo(CANVAS_W - PADDING_X, footerY);
    ctx.stroke();

    // Logo at bottom-right (small)
    const logoImg = await getLogoImage();
    if (logoImg) {
      const targetH = 22;
      const aspect = logoImg.width / logoImg.height;
      const lh = targetH;
      const lw = lh * aspect;
      ctx.drawImage(logoImg, CANVAS_W - PADDING_X - lw, footerY + 12, lw, lh);
    }

    return canvas.toDataURL('image/jpeg', 0.92);
  }

  async function renderItem(ctx, item, x, y, width) {
    const photoSize = 158;
    const textX = x + photoSize + 16;

    if (item.photo) {
      const img = await loadImage(item.photo);
      if (img) {
        const aspect = img.width / img.height;
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (aspect > 1) { sw = img.height; sx = (img.width - sw) / 2; }
        else { sh = img.width; sy = (img.height - sh) / 2; }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, photoSize, photoSize);
      }
    } else {
      ctx.fillStyle = 'rgba(200, 194, 178, 0.5)';
      ctx.fillRect(x, y, photoSize, photoSize);
      ctx.strokeStyle = '#a8a290';
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, photoSize, photoSize);
      ctx.setLineDash([]);
    }

    ctx.fillStyle = '#1a1a1a';
    ctx.font = '500 18px "Noto Sans JP", sans-serif';
    ctx.textAlign = 'left';
    const maxTextWidth = width - photoSize - 16;
    const lines = wrapText(ctx, item.name || '', maxTextWidth);
    let ty = y + 28;
    lines.slice(0, 3).forEach(line => {
      ctx.fillText(line, textX, ty);
      ty += 26;
    });

    ctx.fillStyle = '#1a1a1a';
    ctx.font = '600 19px "Archivo", sans-serif';
    ctx.fillText(formatPrice(item.price), textX, ty + 8);
  }

  function wrapText(ctx, text, maxWidth) {
    if (!text) return [''];
    const lines = [];
    let current = '';
    for (const ch of text) {
      const test = current + ch;
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = ch;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  // Auto-format prices: pure numbers → ¥-prefixed with comma separators.
  // If the user typed any non-numeric characters (¥, /, 円, etc.), keep as-is.
  function formatPrice(raw) {
    if (!raw) return '';
    const s = String(raw).trim();
    if (!s) return '';
    // Already contains non-numeric? leave it (handles ¥162 / ¥216, "1,200円" etc.)
    if (/[^\d]/.test(s)) return s;
    // Pure number
    const n = parseInt(s, 10);
    if (isNaN(n)) return s;
    return '¥' + n.toLocaleString('en-US');
  }

  // === Preview ===
  let generatedImages = [];

  async function generatePreview() {
    const pages = buildPages();
    if (pages.length === 0) {
      alert('商品を入力してください');
      return;
    }

    const previewContainer = document.getElementById('preview-pages');
    previewContainer.innerHTML = '<p class="progress">生成中...</p>';
    document.getElementById('modal').classList.add('active');

    generatedImages = [];
    for (let i = 0; i < pages.length; i++) {
      const dataUrl = await renderPage(pages[i], i + 1, pages.length);
      generatedImages.push(dataUrl);
    }

    previewContainer.innerHTML = '';
    generatedImages.forEach((src, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'preview-page';
      const img = document.createElement('img');
      img.src = src;
      wrap.appendChild(img);
      previewContainer.appendChild(wrap);

      const dl = document.createElement('button');
      dl.className = 'btn-secondary';
      dl.style.marginTop = '8px';
      dl.style.width = '100%';
      dl.style.maxWidth = '320px';
      dl.textContent = `${i + 1}枚目をダウンロード`;
      dl.onclick = () => downloadOne(i);
      previewContainer.appendChild(dl);
    });
  }

  // Convert a data URL to a Blob (for proper iOS download support)
  function dataURLToBlob(dataUrl) {
    const [header, base64] = dataUrl.split(',');
    const mimeMatch = header.match(/:(.*?);/);
    const mime = mimeMatch ? mimeMatch[1] : 'application/octet-stream';
    const binStr = atob(base64);
    const len = binStr.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = binStr.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  }

  function downloadOne(i) {
    const blob = dataURLToBlob(generatedImages[i]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `menu_${String(i + 1).padStart(2, '0')}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  async function downloadAll() {
    if (!generatedImages.length) return;

    // Single image: just download directly
    if (generatedImages.length === 1) {
      downloadOne(0);
      return;
    }

    // Multiple images: bundle into a ZIP (works on iOS Safari, single download)
    try {
      const zip = new JSZip();
      generatedImages.forEach((dataUrl, i) => {
        // Strip "data:image/jpeg;base64," prefix
        const base64 = dataUrl.split(',')[1];
        zip.file(`menu_${String(i + 1).padStart(2, '0')}.jpg`, base64, { base64: true });
      });
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `canal-bread-menu_${new Date().toISOString().slice(0,10)}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      console.error('ZIP生成失敗:', e);
      alert('ZIP生成に失敗しました。1枚ずつのダウンロードをお試しください。');
    }
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  load();
  render();
</script>
